[custom.gcloud_expired]
description = "gcloud token expired warning"
command = '''
config=$(cat ~/.config/gcloud/active_config 2>/dev/null) || exit 1
account=$(grep '^account' ~/.config/gcloud/configurations/config_"$config" 2>/dev/null | cut -d= -f2 | tr -d ' ') || exit 1
sqlite3 ~/.config/gcloud/access_tokens.db \
  "SELECT CASE WHEN token_expiry < datetime('now') THEN 'expired' ELSE '' END FROM access_tokens WHERE account_id = '$account';" 2>/dev/null \
  | grep -q '^expired$' && echo "⚠ expired" || exit 1
'''
when = "test -f ~/.config/gcloud/access_tokens.db"
shell = ["bash", "--noprofile", "--norc"]
format = "[$output](bold red) "

[custom.gcloud_expiring]
description = "gcloud token expiring soon warning"
command = '''
config=$(cat ~/.config/gcloud/active_config 2>/dev/null) || exit 1
account=$(grep '^account' ~/.config/gcloud/configurations/config_"$config" 2>/dev/null | cut -d= -f2 | tr -d ' ') || exit 1
sqlite3 ~/.config/gcloud/access_tokens.db \
  "SELECT CASE WHEN token_expiry >= datetime('now') AND token_expiry < datetime('now', '+30 minutes') THEN 'expiring' ELSE '' END FROM access_tokens WHERE account_id = '$account';" 2>/dev/null \
  | grep -q '^expiring$' && echo "⚠ expiring" || exit 1
'''
when = "test -f ~/.config/gcloud/access_tokens.db"
shell = ["bash", "--noprofile", "--norc"]
format = "[$output](bold yellow) "

