[custom.gcloud_expired]
description = "gcloud 24h session expired (refresh token revoked by org policy)"
command = '''
expires=$(grep -o '"session_expires": *[0-9]*' ~/.gcauth/session.json | grep -o '[0-9]*')
[ -n "$expires" ] || exit 1
now=$(date +%s)
[ "$now" -gt "$expires" ] && echo 'âڑ  gc expired' || exit 1
'''
when = "test -f ~/.gcauth/session.json"
shell = ["bash", "--noprofile", "--norc"]
format = "[$output](bold red) "

[custom.gcloud_expiring]
description = "gcloud 24h session expiring within 2 hours"
command = '''
expires=$(grep -o '"session_expires": *[0-9]*' ~/.gcauth/session.json | grep -o '[0-9]*')
[ -n "$expires" ] || exit 1
now=$(date +%s)
remaining=$((expires - now))
[ "$remaining" -le 0 ] && exit 1
[ "$remaining" -lt 7200 ] || exit 1
h=$((remaining / 3600))
m=$(((remaining % 3600) / 60))
echo "âڑ  gc ${h}h${m}m"
'''
when = "test -f ~/.gcauth/session.json"
shell = ["bash", "--noprofile", "--norc"]
format = "[$output](bold yellow) "

